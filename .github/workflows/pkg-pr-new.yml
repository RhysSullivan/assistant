name: Publish (pkg.pr.new)

on:
  pull_request:

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - run: bun install --frozen-lockfile

      - run: bun run build:packages

      - name: Build executor preview wrapper (linux-x64 binary)
        env:
          EXECUTOR_PREVIEW_CDN_URL: ${{ vars.EXECUTOR_PREVIEW_CDN_URL }}
          EXECUTOR_PREVIEW_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: bun run --filter=executor build:preview

      - name: Upload preview binaries to R2
        # Uses Bun.s3 against the R2 S3-compatible endpoint. Avoids aws-cli
        # endpoint-validation quirks on ubuntu-latest and handles multipart
        # uploads for tarballs larger than the Cloudflare API gateway limit.
        env:
          S3_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          S3_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          S3_BUCKET: executor-previews
          SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: bun run apps/cli/scripts/upload-preview.ts

      - run: npx pkg-pr-new publish --compact './apps/cli/dist/executor' './packages/core/sdk' './packages/plugins/*'
